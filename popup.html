<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Twitter Junkie</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 200px;
            padding: 16px;
            margin: 0;
            background-color: #15202B; /* X.com dim */
            color: #ffffff;
            text-align: center;
        }
        h2 {
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .btn-control {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: #1d9bf0;
            color: white;
            border: none;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-control:hover {
            background: #1a8cd8;
        }
        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <h2>Twitter Junkie</h2>
    <button id="tj-open-options" class="btn-control">Open Settings</button>
    <button id="tj-reset-pos" class="btn-control btn-reset" style="margin-top: 16px;">Reset Video Buttons</button>
    <script src="popup.js"></script>
</body>
</html>
